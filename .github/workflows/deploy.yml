name: Deploy Wheelca

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api-stage-wheelca.mhai.app
        run: npm run build

  deploy-staging:
    name: Deploy to Staging (RPi5)
    needs: test
    runs-on: [self-hosted, raspi5]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Sync application code
        run: |
          rsync -a --delete --exclude='node_modules' \
            ./backend/ /opt/docker/compose/wheelchair-map/backend/
          rsync -a --delete --exclude='node_modules' \
            ./frontend/ /opt/docker/compose/wheelchair-map/frontend/
          rsync -a ./scripts/ /opt/docker/compose/wheelchair-map/scripts/

      - name: Build and restart containers
        working-directory: /opt/docker/compose/wheelchair-map
        run: |
          docker compose build --no-cache backend frontend
          docker compose up -d --force-recreate backend frontend
          echo "Staging deploy complete: $(date)"

  deploy-production:
    name: Deploy to Production (Hetzner)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Sync application code to Hetzner
        run: |
          rsync -avz --delete --exclude='node_modules' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./backend/ martin@${{ secrets.PRODUCTION_HOST }}:/opt/docker/compose/wheelchair-map/backend/
          rsync -avz --delete --exclude='node_modules' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./frontend/ martin@${{ secrets.PRODUCTION_HOST }}:/opt/docker/compose/wheelchair-map/frontend/
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./scripts/ martin@${{ secrets.PRODUCTION_HOST }}:/opt/docker/compose/wheelchair-map/scripts/

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: martin
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/docker/compose/wheelchair-map
            docker compose build --no-cache backend frontend
            docker compose up -d --force-recreate backend frontend
            echo "Production deploy complete: $(date)"
